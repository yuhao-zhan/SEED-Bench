# ZeRO-3 + optimizer CPU offload only (params stay on GPU).
# For 14B on 2–4 GPUs: avoids OOM at optimizer.step() (~3.35 GiB needed per GPU).
# Override num_processes via: accelerate launch --num_processes N ...
compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  deepspeed_multinode_launcher: standard
  gradient_accumulation_steps: 1
  gradient_clipping: 1.0
  offload_optimizer_device: cpu
  offload_param_device: none
  zero3_init_flag: false
  zero3_save_16bit_model: true
  zero_stage: 3
  train_micro_batch_size_per_gpu: 1
distributed_type: DEEPSPEED
downcast_bf16: 'no'
mixed_precision: bf16
num_machines: 1
num_processes: 2
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
