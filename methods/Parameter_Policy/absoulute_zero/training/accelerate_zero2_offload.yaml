# Single-GPU: use external DeepSpeed JSON so optimizer CPU offload is actually applied.
# Run from scripts/ so the path below resolves.
compute_environment: LOCAL_MACHINE
debug: false
deepspeed_config:
  deepspeed_multinode_launcher: standard
  gradient_accumulation_steps: 1
  gradient_clipping: 1.0
  zero3_init_flag: false
  train_micro_batch_size_per_gpu: 1
  zero_optimization:
    stage: 2
    offload_optimizer:
      device: "cpu"
    offload_param:
      device: "none"
    contiguous_gradients: true
    overlap_comm: true
distributed_type: DEEPSPEED
downcast_bf16: 'no'
mixed_precision: bf16
num_machines: 1
num_processes: 1
rdzv_backend: static
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false
